services:
  website:
    build: 
      context: .
      dockerfile: Dockerfile

    ports: ["3005:3005"]
    volumes: [./app:/internsystem-v2/app]
    env_file: .env

    depends_on:
      db:
        condition: service_healthy

    command: sh -c "npm run prismapush && npm run prismaseed && npm run dev"


  db:
    image: postgres:18-alpine
    environment:
      - POSTGRES_PASSWORD=mysecretpassword

    ports: ["3306:5432"]

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
